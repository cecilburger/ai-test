server {
    listen 80;
    server_name 72.62.244.186;

    location /ailivechat/ {
        proxy_pass http://127.0.0.1:5100/ailivechat/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Prefix /ailivechat;

        # Required for SSE
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }
}
