<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garuda Food Live</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(214,43,39,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(255,100,0,0.10) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(214,43,39,0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      height: 100vh;
      max-height: 900px;
      display: flex;
      flex-direction: column;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(214,43,39,0.2), 0 0 120px rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.07);
    }

    /* ── CHARACTER PANEL ── */
    .character-panel {
      position: relative;
      flex: 0 0 42%;
      background: linear-gradient(180deg, #0d0d14 0%, #12121a 100%);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
    }

    /* subtle grid bg */
    .character-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(214,43,39,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(214,43,39,0.04) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    /* glow under character */
    .character-panel::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 80px;
      background: radial-gradient(ellipse, rgba(214,43,39,0.35) 0%, transparent 70%);
      pointer-events: none;
    }

    .character-wrap {
      position: relative;
      z-index: 2;
      width: 260px;
      height: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .character-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      /* Chroma key: remove green background */
      mix-blend-mode: normal;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.6));
      /* CSS green screen removal */
      --green-key: 1;
    }

    /* State animations — photo stays still, only canvas animates */
    .character-wrap.idle .character-img,
    .character-wrap.thinking .character-img,
    .character-wrap.talking .character-img {
      animation: none;
      transform: none;
    }

    /* Canvas overlay for eye blink + mouth */
    #faceCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    /* State label */
    .state-badge {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      padding: 4px 12px;
      border-radius: 20px;
      transition: all 0.3s;
      white-space: nowrap;
    }

    .state-badge.idle     { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.4); }
    .state-badge.thinking { background: rgba(255,180,0,0.15);   color: #fbbf24; }
    .state-badge.talking  { background: rgba(74,222,128,0.15);  color: #4ade80; }

    /* Header overlay on character panel */
    .live-header {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .live-badge {
      background: linear-gradient(135deg, #d62b27, #ff4444);
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: 1px;
      animation: pulse-red 1.5s infinite;
      box-shadow: 0 0 10px rgba(214,43,39,0.6);
    }

    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 10px rgba(214,43,39,0.6); }
      50%       { box-shadow: 0 0 20px rgba(214,43,39,0.9); }
    }

    .voice-toggle {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      cursor: pointer;
      width: 32px;
      height: 32px;
      border-radius: 10px;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      color: white;
    }
    .voice-toggle:hover { background: rgba(255,255,255,0.15); }
    .voice-toggle.muted { opacity: 0.35; }

    /* ── CHAT PANEL ── */
    .chat-panel {
      flex: 1;
      background: rgba(12,12,18,0.97);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .logo {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      background: linear-gradient(135deg, #d62b27, #ff6b35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      font-size: 14px;
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(214,43,39,0.4);
    }

    .header-info h1 { font-size: 13px; font-weight: 600; color: #fff; }
    .header-info .status {
      font-size: 10px; color: #4ade80;
      display: flex; align-items: center; gap: 4px; margin-top: 1px;
    }
    .status-dot {
      width: 5px; height: 5px;
      background: #4ade80; border-radius: 50%;
      animation: pulse-green 2s infinite;
    }
    @keyframes pulse-green {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    .welcome { text-align: center; padding: 8px 0 4px; }
    .welcome p { font-size: 11px; color: rgba(255,255,255,0.3); margin-bottom: 10px; }

    .suggestions {
      display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
    }
    .suggestion-btn {
      background: rgba(214,43,39,0.1);
      border: 1px solid rgba(214,43,39,0.25);
      color: rgba(255,255,255,0.7);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }
    .suggestion-btn:hover {
      background: rgba(214,43,39,0.25);
      color: #fff;
      transform: translateY(-1px);
    }

    .message {
      display: flex;
      align-items: flex-end;
      gap: 7px;
      animation: fadeUp 0.2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 26px; height: 26px;
      border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: white;
    }
    .message.bot .avatar  { background: linear-gradient(135deg,#d62b27,#ff6b35); box-shadow: 0 0 8px rgba(214,43,39,0.35); }
    .message.user .avatar { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); }

    .bubble {
      max-width: 80%;
      padding: 8px 12px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.bot .bubble  {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.88);
      border-bottom-left-radius: 3px;
    }
    .message.user .bubble {
      background: linear-gradient(135deg,#d62b27,#e83a36);
      color: white;
      border-bottom-right-radius: 3px;
      box-shadow: 0 3px 12px rgba(214,43,39,0.3);
    }

    .typing-indicator { display: flex; gap: 4px; padding: 2px 0; align-items: center; }
    .typing-indicator span {
      width: 6px; height: 6px;
      background: rgba(255,255,255,0.35); border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30%          { transform: translateY(-5px); }
    }

    .input-area {
      padding: 10px 14px 14px;
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex; gap: 8px; align-items: flex-end;
    }
    .input-wrap {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 14px;
      display: flex; align-items: flex-end;
      padding: 8px 12px;
      transition: border-color 0.2s;
    }
    .input-wrap:focus-within {
      border-color: rgba(214,43,39,0.45);
      box-shadow: 0 0 0 3px rgba(214,43,39,0.07);
    }
    .input-wrap textarea {
      flex: 1; background: none; border: none; outline: none;
      color: #fff; font-size: 13px; font-family: inherit;
      resize: none; line-height: 1.5; max-height: 80px;
    }
    .input-wrap textarea::placeholder { color: rgba(255,255,255,0.2); }

    .send-btn {
      width: 38px; height: 38px;
      border-radius: 11px;
      background: linear-gradient(135deg,#d62b27,#ff4444);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.2s;
      box-shadow: 0 3px 12px rgba(214,43,39,0.4);
    }
    .send-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(214,43,39,0.55); }
    .send-btn:disabled { background: rgba(255,255,255,0.07); box-shadow: none; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 16px; height: 16px; fill: white; }
  </style>
</head>
<body>
<div class="app">

  <!-- CHARACTER PANEL -->
  <div class="character-panel">
    <div class="live-header">
      <span class="live-badge">LIVE</span>
      <button class="voice-toggle" id="voiceBtn" onclick="toggleVoice()" title="Toggle voice">🔊</button>
    </div>

    <div class="state-badge idle" id="stateBadge">😊 Siap</div>

    <div class="character-wrap idle" id="characterWrap">
      <img
        id="characterImg"
        class="character-img"
        src="/static/character.png"
        alt="Garuda Food Assistant"
      />
      <canvas id="faceCanvas"></canvas>
      <video
        id="characterVideo"
        class="character-img"
        style="display:none; position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:top center;"
        playsinline
      ></video>
    </div>
  </div>

  <!-- CHAT PANEL -->
  <div class="chat-panel">
    <div class="chat-header">
      <div class="logo">G</div>
      <div class="header-info">
        <h1>Garuda Food Assistant</h1>
        <div class="status"><span class="status-dot"></span>Online sekarang</div>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="welcome">
        <p>Tanya apa aja soal snack GarudaFood ya! 🥜🍫</p>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="sendSuggestion(this)">Snack apa aja?</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">Kacang Garuda</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">Chocolatos rasa apa?</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">Rekomendasi manis</button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea
          id="userInput"
          placeholder="Tanya soal snack GarudaFood..."
          rows="1"
          onkeydown="handleKeyDown(event)"
          oninput="autoResize(this)"
        ></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
  // ── Character Face Animator ─────────────────────────────────────────
  const canvas  = document.getElementById("faceCanvas");
  const ctx     = canvas.getContext("2d");
  const imgEl   = document.getElementById("characterImg");

  // Face landmark positions — calibrated for character.png
  // Image is portrait (9:16), displayed top-aligned, object-fit:cover
  // Panel shows roughly top 45% of the full image
  // Face occupies roughly y:28%-65% of full image → in panel: y:62%-100%+
  // So we map face features relative to what's visible in the panel
  const FACE = {
    eyeL:  { x: 0.415, y: 0.575, w: 0.085, h: 0.032 },
    eyeR:  { x: 0.585, y: 0.570, w: 0.085, h: 0.032 },
    mouth: { x: 0.500, y: 0.710, w: 0.145, h: 0.026 },
  };

  let blinkState   = 0;    // 0=open, 1=closing, 2=closed, 3=opening
  let blinkTimer   = 0;
  let blinkNext    = 180;  // frames until next blink
  let mouthOpen    = 0;    // 0-1 openness
  let mouthTarget  = 0;
  let isTalking    = false;
  let talkPhase    = 0;
  let frameCount   = 0;

  function resizeCanvas() {
    canvas.width  = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  }
  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  // Wait for image to load before starting
  imgEl.onload = startAnimator;
  if (imgEl.complete) startAnimator();

  function startAnimator() {
    requestAnimationFrame(animateFrame);
  }

  function animateFrame() {
    frameCount++;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const W = canvas.width;
    const H = canvas.height;

    // ── Blink logic ──
    blinkTimer++;
    if (blinkTimer >= blinkNext) {
      blinkState = 1;
      blinkTimer = 0;
      blinkNext  = 150 + Math.random() * 200; // blink every 2.5-5.8s
    }

    let eyeClose = 0;
    if (blinkState === 1) { eyeClose += 0.25; if (eyeClose >= 1) blinkState = 2; }
    else if (blinkState === 2) { eyeClose = 1; blinkState = 3; }
    else if (blinkState === 3) { eyeClose -= 0.25; if (eyeClose <= 0) { eyeClose = 0; blinkState = 0; } }

    // ── Mouth logic ──
    if (isTalking) {
      talkPhase += 0.18;
      mouthTarget = 0.35 + Math.sin(talkPhase * 3.2) * 0.3 + Math.sin(talkPhase * 7.1) * 0.15;
      mouthTarget = Math.max(0.05, Math.min(1, mouthTarget));
    } else {
      mouthTarget = 0;
    }
    mouthOpen += (mouthTarget - mouthOpen) * 0.25;

    // ── Draw eye overlays ──
    [FACE.eyeL, FACE.eyeR].forEach(eye => {
      const ex = eye.x * W;
      const ey = eye.y * H;
      const ew = eye.w * W;
      const eh = eye.h * H;

      if (eyeClose > 0) {
        // Draw eyelid closing over eye
        ctx.save();
        ctx.fillStyle = getSkinColor();
        const lidH = eh * eyeClose * 2.2;
        // Upper lid
        ctx.beginPath();
        ctx.ellipse(ex, ey - eh * 0.5 + lidH * 0.5, ew * 0.55, lidH * 0.6, 0, 0, Math.PI * 2);
        ctx.fill();
        // Lower lid
        ctx.beginPath();
        ctx.ellipse(ex, ey + eh * 0.5 - lidH * 0.3, ew * 0.55, lidH * 0.4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    });

    // ── Draw mouth overlay ──
    if (mouthOpen > 0.02) {
      const mx = FACE.mouth.x * W;
      const my = FACE.mouth.y * H;
      const mw = FACE.mouth.w * W;
      const mh = FACE.mouth.h * H;
      const openH = mh * mouthOpen * 3.5;

      ctx.save();
      // Dark mouth interior
      ctx.fillStyle = "rgba(30,10,10,0.85)";
      ctx.beginPath();
      ctx.ellipse(mx, my + openH * 0.1, mw * 0.42, openH * 0.55, 0, 0, Math.PI * 2);
      ctx.fill();

      // Upper lip
      ctx.fillStyle = getLipColor();
      ctx.beginPath();
      ctx.ellipse(mx, my - openH * 0.3, mw * 0.48, mh * 0.55, 0, Math.PI, Math.PI * 2);
      ctx.fill();

      // Lower lip
      ctx.beginPath();
      ctx.ellipse(mx, my + openH * 0.55, mw * 0.48, mh * 0.65, 0, 0, Math.PI);
      ctx.fill();
      ctx.restore();
    }

    debugDots();
    requestAnimationFrame(animateFrame);
  }

  // Debug: set to true to show red dots at landmark positions for calibration
  function getSkinColor() { return "rgba(220,175,140,1)"; }
  function getLipColor()  { return "rgba(195,100,100,0.9)"; }

  // Debug: set to true to show red dots at landmark positions for calibration
  const DEBUG_LANDMARKS = true;

  function debugDots() {
    if (!DEBUG_LANDMARKS) return;
    const W = canvas.width, H = canvas.height;
    ctx.fillStyle = "red";
    [FACE.eyeL, FACE.eyeR, FACE.mouth].forEach(f => {
      ctx.beginPath();
      ctx.arc(f.x * W, f.y * H, 4, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  function setTalking(val) {
    isTalking = val;
    if (!val) { talkPhase = 0; mouthTarget = 0; }
  }
  // ────────────────────────────────────────────────────────────────────

  // ── Character state ──────────────────────────────────────────────────
  const characterWrap = document.getElementById("characterWrap");
  const stateBadge    = document.getElementById("stateBadge");

  function setCharacterState(state) {
    characterWrap.className = `character-wrap ${state}`;
    const labels = { idle: "😊 Siap", thinking: "💭 Mikir...", talking: "🗣️ Ngomong" };
    stateBadge.textContent = labels[state] || "";
    stateBadge.className   = `state-badge ${state}`;
    setTalking(state === "talking");
  }

  // ── Voice (ElevenLabs TTS) ───────────────────────────────────────────
  let voiceEnabled = true;
  let currentAudio = null;
  let isSpeaking   = false;
  const messageQueue = [];

  function toggleVoice() {
    voiceEnabled = !voiceEnabled;
    const btn = document.getElementById("voiceBtn");
    btn.textContent = voiceEnabled ? "🔊" : "🔇";
    btn.classList.toggle("muted", !voiceEnabled);
    if (!voiceEnabled && currentAudio) {
      currentAudio.pause();
      currentAudio = null;
      isSpeaking = false;
      setCharacterState("idle");
    }
  }

  function fetchAndPlay(text) {
    return new Promise(async (resolve) => {
      if (!voiceEnabled) return resolve();
      try {
        const res = await fetch("/talk", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });
        if (!res.ok) return resolve();
        const data = await res.json();

        setCharacterState("talking");

        if (data.video_url) {
          // Play D-ID talking head video
          const videoEl = document.getElementById("characterVideo");
          const imgEl   = document.getElementById("characterImg");
          videoEl.src = data.video_url;
          videoEl.style.display = "block";
          imgEl.style.display   = "none";
          
          videoEl.onended = () => {
            videoEl.style.display = "none";
            imgEl.style.display   = "block";
            setCharacterState("idle");
            resolve();
          };
          videoEl.onerror = () => {
            videoEl.style.display = "none";
            imgEl.style.display   = "block";
            setCharacterState("idle");
            resolve();
          };
          
          // Try to play — if blocked, fallback to audio
          videoEl.play().catch(() => {
            console.warn("Video autoplay blocked, falling back to audio");
            videoEl.style.display = "none";
            imgEl.style.display   = "block";
            // Fallback: play audio only
            if (data.audio) {
              const audioBytes = Uint8Array.from(atob(data.audio), c => c.charCodeAt(0));
              const blob = new Blob([audioBytes], { type: "audio/mpeg" });
              const url  = URL.createObjectURL(blob);
              if (currentAudio) currentAudio.pause();
              currentAudio = new Audio(url);
              currentAudio.onended = () => { setCharacterState("idle"); resolve(); };
              currentAudio.onerror = () => { setCharacterState("idle"); resolve(); };
              currentAudio.play();
            } else {
              setCharacterState("idle");
              resolve();
            }
          });
        } else if (data.audio) {
          // Fallback: play audio only
          const audioBytes = Uint8Array.from(atob(data.audio), c => c.charCodeAt(0));
          const blob = new Blob([audioBytes], { type: "audio/mpeg" });
          const url  = URL.createObjectURL(blob);
          if (currentAudio) currentAudio.pause();
          currentAudio = new Audio(url);
          currentAudio.onended = () => { setCharacterState("idle"); resolve(); };
          currentAudio.onerror = () => { setCharacterState("idle"); resolve(); };
          currentAudio.play();
        } else {
          resolve();
        }
      } catch (_) { resolve(); }
    });
  }

  async function processQueue() {
    if (isSpeaking || messageQueue.length === 0) return;
    isSpeaking = true;
    const { username, question, answer } = messageQueue.shift();

    // 1. Read comment
    await fetchAndPlay(`${username} nanya: ${question}`);
    // 2. Read answer
    await fetchAndPlay(answer);

    setCharacterState("idle");
    isSpeaking = false;
    processQueue();
  }

  function enqueueSpeak(username, question, answer) {
    if (!voiceEnabled) return;
    messageQueue.push({ username, question, answer });
    processQueue();
  }

  // ── Chat logic ───────────────────────────────────────────────────────
  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("userInput");
  const sendBtn    = document.getElementById("sendBtn");
  let conversationHistory = [];
  let isProcessingChat    = false;
  let pendingQueue        = [];

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 80) + "px";
  }

  function handleKeyDown(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function sendSuggestion(btn) {
    inputEl.value = btn.textContent;
    sendMessage();
  }

  function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  function appendMessage(role, text, username) {
    const div   = document.createElement("div");
    div.className = `message ${role}`;
    const label = role === "bot" ? "G" : (username ? username[0].toUpperCase() : "U");
    div.innerHTML = `<div class="avatar">${label}</div><div class="bubble">${escapeHtml(text)}</div>`;
    messagesEl.appendChild(div);
    scrollToBottom();
    return div.querySelector(".bubble");
  }

  function showTyping() {
    const div = document.createElement("div");
    div.className = "message bot";
    div.id = "typing";
    div.innerHTML = `<div class="avatar">G</div><div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById("typing");
    if (el) el.remove();
  }

  function escapeHtml(t) {
    return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = "";
    inputEl.style.height = "auto";
    pendingQueue.push({ text, username: "Kak" });
    processChatQueue();
  }

  async function processChatQueue() {
    if (isProcessingChat || pendingQueue.length === 0) return;
    isProcessingChat = true;
    const { text, username } = pendingQueue.shift();

    conversationHistory.push({ role: "user", content: text });
    appendMessage("user", text, username);
    showTyping();
    setCharacterState("thinking");

    let botBubble = null;
    let botText   = "";

    try {
      const response = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: conversationHistory }),
      });

      const reader  = response.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        for (const line of decoder.decode(value, { stream: true }).split("\n")) {
          if (!line.startsWith("data: ")) continue;
          const raw = line.slice(6).trim();
          if (raw === "[DONE]") break;
          try {
            const { text: delta } = JSON.parse(raw);
            if (delta) {
              if (!botBubble) { removeTyping(); botBubble = appendMessage("bot", ""); }
              botText += delta;
              botBubble.textContent = botText;
              scrollToBottom();
            }
          } catch (_) {}
        }
      }

      if (botText) {
        conversationHistory.push({ role: "assistant", content: botText });
        enqueueSpeak(username, text, botText);
      }
    } catch (err) {
      removeTyping();
      appendMessage("bot", "Maaf kak, ada gangguan. Coba lagi ya! 😊");
      conversationHistory.pop();
      setCharacterState("idle");
    } finally {
      isProcessingChat = false;
      processChatQueue();
    }
  }

  // ── TikTok Live hook ─────────────────────────────────────────────────
  function receiveComment(username, text) {
    pendingQueue.push({ text, username });
    processChatQueue();
  }

  const liveStream = new EventSource("/live_stream");
  liveStream.onmessage = (e) => {
    const { username, text } = JSON.parse(e.data);
    receiveComment(username, text);
  };
</script>
</body>
</html>
