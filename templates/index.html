<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Live Host</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0f; height: 100vh; display: flex; overflow: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse at 10% 50%, rgba(99,102,241,0.12) 0%, transparent 55%),
                  radial-gradient(ellipse at 90% 20%, rgba(168,85,247,0.08) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }

    /* VIDEO PANEL */
    .video-panel {
      position: relative; z-index: 1; flex: 0 0 55%;
      background: #000; overflow: hidden;
      border-right: 1px solid rgba(255,255,255,0.06);
    }
    .live-badge {
      position: absolute; top: 16px; left: 16px; z-index: 10;
      background: linear-gradient(135deg,#ef4444,#dc2626);
      color: white; font-size: 11px; font-weight: 700;
      padding: 4px 10px; border-radius: 20px; letter-spacing: 1px;
      animation: pulse-red 1.5s infinite;
    }
    @keyframes pulse-red {
      0%,100% { box-shadow: 0 0 12px rgba(239,68,68,0.6); }
      50%      { box-shadow: 0 0 24px rgba(239,68,68,0.9); }
    }

    /* CHAT PANEL */
    .chat-panel { position: relative; z-index: 1; flex: 1; background: rgba(12,12,18,0.97); display: flex; flex-direction: column; overflow: hidden; }
    .messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.08) transparent; }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    .welcome { text-align: center; padding: 12px 0 6px; }
    .welcome p { font-size: 12px; color: rgba(255,255,255,0.3); margin-bottom: 10px; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
    .suggestion-btn {
      background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.25);
      color: rgba(255,255,255,0.7); padding: 5px 12px; border-radius: 20px;
      font-size: 11px; font-family: inherit; cursor: pointer; transition: all 0.2s;
    }
    .suggestion-btn:hover { background: rgba(99,102,241,0.25); color: #fff; transform: translateY(-1px); }

    .message { display: flex; align-items: flex-end; gap: 7px; animation: fadeUp 0.2s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .message.user { flex-direction: row-reverse; }
    .msg-avatar { width: 26px; height: 26px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: white; }
    .message.bot .msg-avatar  { background: linear-gradient(135deg,#6366f1,#a855f7); }
    .message.user .msg-avatar { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); }
    .bubble { max-width: 82%; padding: 8px 12px; border-radius: 14px; font-size: 13px; line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
    .message.bot .bubble  { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.07); color: rgba(255,255,255,0.88); border-bottom-left-radius: 3px; }
    .message.user .bubble { background: linear-gradient(135deg,#6366f1,#7c3aed); color: white; border-bottom-right-radius: 3px; box-shadow: 0 3px 12px rgba(99,102,241,0.3); }

    .typing-indicator { display: flex; gap: 4px; padding: 2px 0; align-items: center; }
    .typing-indicator span { width: 6px; height: 6px; background: rgba(255,255,255,0.35); border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-5px); } }

    .input-area { padding: 10px 14px 14px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; gap: 8px; align-items: flex-end; background: rgba(18,18,26,0.9); }
    .input-wrap { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09); border-radius: 14px; display: flex; align-items: flex-end; padding: 8px 12px; transition: border-color 0.2s; }
    .input-wrap:focus-within { border-color: rgba(99,102,241,0.5); box-shadow: 0 0 0 3px rgba(99,102,241,0.08); }
    .input-wrap textarea { flex: 1; background: none; border: none; outline: none; color: #fff; font-size: 13px; font-family: inherit; resize: none; line-height: 1.5; max-height: 80px; }
    .input-wrap textarea::placeholder { color: rgba(255,255,255,0.2); }
    .send-btn { width: 38px; height: 38px; border-radius: 11px; background: linear-gradient(135deg,#6366f1,#7c3aed); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; box-shadow: 0 3px 12px rgba(99,102,241,0.4); }
    .send-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(99,102,241,0.55); }
    .send-btn:disabled { background: rgba(255,255,255,0.07); box-shadow: none; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 16px; height: 16px; fill: white; }

    .voice-btn { position: fixed; bottom: 16px; left: 16px; width: 36px; height: 36px; border-radius: 50%; background: rgba(99,102,241,0.2); border: 1px solid rgba(99,102,241,0.4); color: white; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 100; transition: all 0.2s; }
    .voice-btn:hover { background: rgba(99,102,241,0.4); }
    .voice-btn.muted { opacity: 0.35; }
  </style>
</head>
<body>

  <!-- LEFT: VIDEO -->
  <div class="video-panel">
    <span class="live-badge">LIVE</span>
    <iframe
      src="https://www.youtube.com/embed/lyoOUntlnbM?autoplay=1&mute=1&loop=1&playlist=lyoOUntlnbM"
      allow="autoplay"
      style="position:absolute; inset:0; width:100%; height:100%; border:none;"
    ></iframe>
    <video id="wavOverlay" playsinline style="display:none; position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:5;"></video>
  </div>

  <!-- RIGHT: CHAT -->
  <div class="chat-panel">
    <div class="messages" id="messages">
      <div class="welcome">
        <p style="font-size:10px; opacity:0.3; letter-spacing:1px; text-transform:uppercase;">Monitor Live Chat</p>
        <p style="margin-top:6px;">Komentar dari live akan muncul di sini 👀</p>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="sendSuggestion(this)">Halo kak!</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">Cerita dong</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">Tips hari ini</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">Rekomendasi film</button>
        </div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-wrap">
        <textarea id="userInput" placeholder="Ketik pesan..." rows="1"
          onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()" title="Toggle suara">🔊</button>

<script>
  // ── Voice ──────────────────────────────────────────────────────────
  let voiceEnabled = true, currentAudio = null, isSpeaking = false;
  const messageQueue = [];

  function toggleVoice() {
    voiceEnabled = !voiceEnabled;
    const btn = document.getElementById("voiceBtn");
    btn.textContent = voiceEnabled ? "🔊" : "🔇";
    btn.classList.toggle("muted", !voiceEnabled);
    if (!voiceEnabled && currentAudio) { currentAudio.pause(); currentAudio = null; isSpeaking = false; }
  }

  function fetchAndPlay(text) {
    return new Promise(async (resolve) => {
      if (!voiceEnabled) return resolve();
      try {
        const res = await fetch("/talk", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ text }) });
        if (!res.ok) return speakFallback(text, resolve);
        const data = await res.json();
        if (data.video_url) {
          const overlay = document.getElementById("wavOverlay");
          overlay.src = data.video_url; overlay.style.display = "block";
          overlay.onended = () => { overlay.style.display = "none"; resolve(); };
          overlay.onerror = () => { overlay.style.display = "none"; resolve(); };
          overlay.play().catch(() => { overlay.style.display = "none"; if (data.audio) playAudio(data.audio, resolve); else speakFallback(text, resolve); });
        } else if (data.audio) {
          playAudio(data.audio, resolve);
        } else {
          speakFallback(text, resolve);
        }
      } catch (_) { speakFallback(text, resolve); }
    });
  }

  // Web Speech API fallback when ElevenLabs quota exceeded
  function speakFallback(text, resolve) {
    if (!("speechSynthesis" in window)) return resolve();
    speechSynthesis.cancel();
    const clean = text.replace(/[\u{1F300}-\u{1FAFF}]/gu, "").trim();
    if (!clean) return resolve();
    const utt = new SpeechSynthesisUtterance(clean);
    const voices = speechSynthesis.getVoices();
    const idVoice = voices.find(v => v.lang.startsWith("id")) || voices[0];
    if (idVoice) utt.voice = idVoice;
    utt.lang = "id-ID"; utt.rate = 1.05; utt.pitch = 1.1;
    utt.onend = resolve; utt.onerror = resolve;
    speechSynthesis.speak(utt);
  }

  function playAudio(b64, resolve) {
    const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const url = URL.createObjectURL(new Blob([bytes], { type: "audio/mpeg" }));
    if (currentAudio) currentAudio.pause();
    currentAudio = new Audio(url);
    currentAudio.onended = resolve;
    currentAudio.onerror = resolve;
    currentAudio.play();
  }

  async function processQueue() {
    if (isSpeaking || messageQueue.length === 0) return;
    isSpeaking = true;
    const { answer } = messageQueue.shift();
    await fetchAndPlay(answer);
    isSpeaking = false;
    processQueue();
  }

  function enqueueSpeak(username, question, answer) {
    if (!voiceEnabled) return;
    messageQueue.push({ answer });
    processQueue();
  }

  // ── Chat ───────────────────────────────────────────────────────────
  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("userInput");
  let conversationHistory = [], isProcessingChat = false, pendingQueue = [];

  function autoResize(el) { el.style.height = "auto"; el.style.height = Math.min(el.scrollHeight, 80) + "px"; }
  function handleKeyDown(e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
  function sendSuggestion(btn) { inputEl.value = btn.textContent; sendMessage(); }
  function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  function appendMessage(role, text, username) {
    const div = document.createElement("div");
    div.className = `message ${role}`;
    const label = role === "bot" ? "🤖" : (username ? username[0].toUpperCase() : "U");
    div.innerHTML = `<div class="msg-avatar">${label}</div><div class="bubble">${escapeHtml(text)}</div>`;
    messagesEl.appendChild(div); scrollToBottom();
    return div.querySelector(".bubble");
  }

  function showTyping() {
    const div = document.createElement("div");
    div.className = "message bot"; div.id = "typing";
    div.innerHTML = `<div class="msg-avatar">🤖</div><div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
    messagesEl.appendChild(div); scrollToBottom();
  }

  function removeTyping() { const el = document.getElementById("typing"); if (el) el.remove(); }
  function escapeHtml(t) { return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

  function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = ""; inputEl.style.height = "auto";
    pendingQueue.push({ text, username: "Kak" });
    processChatQueue();
  }

  async function processChatQueue() {
    if (isProcessingChat || pendingQueue.length === 0) return;
    isProcessingChat = true;
    const { text, username } = pendingQueue.shift();
    conversationHistory.push({ role: "user", content: text });
    appendMessage("user", text, username);
    showTyping();
    let botBubble = null, botText = "";
    try {
      const res = await fetch("/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ messages: conversationHistory }) });
      const reader = res.body.getReader(), decoder = new TextDecoder();
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        for (const line of decoder.decode(value, { stream: true }).split("\n")) {
          if (!line.startsWith("data: ")) continue;
          const raw = line.slice(6).trim();
          if (raw === "[DONE]") break;
          try {
            const { text: delta } = JSON.parse(raw);
            if (delta) {
              if (!botBubble) { removeTyping(); botBubble = appendMessage("bot", ""); }
              botText += delta; botBubble.textContent = botText; scrollToBottom();
            }
          } catch (_) {}
        }
      }
      if (botText) {
        conversationHistory.push({ role: "assistant", content: botText });
        // Fire audio in parallel — don't await, let it play while next message can be queued
        enqueueSpeak(username, text, botText);
      }
    } catch (err) {
      removeTyping(); appendMessage("bot", "Maaf, ada gangguan. Coba lagi ya! 😊"); conversationHistory.pop();
    } finally {
      isProcessingChat = false; processChatQueue();
    }
  }

  // TikTok Live
  function receiveComment(username, text) { pendingQueue.push({ text, username }); processChatQueue(); }
  const liveStream = new EventSource("/live_stream");
  liveStream.onmessage = (e) => { const { username, text } = JSON.parse(e.data); receiveComment(username, text); };
</script>
</body>
</html>
